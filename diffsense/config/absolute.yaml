rules:
  # Concurrency (Absolute Risk)
  - id: runtime.concurrency.new_thread
    rule_type: absolute
    match: 'new\s+Thread\(.*\)'
    severity: high
    impact: runtime
    rationale: "Using 'new Thread()' bypasses managed thread pools, risking resource exhaustion."

  - id: runtime.concurrency.fixed_threadpool_1
    rule_type: absolute
    match: 'Executors\.newFixedThreadPool\(1\)'
    severity: medium
    impact: runtime
    rationale: "FixedThreadPool(1) can lead to request queuing and latency spikes under load."

  - id: runtime.concurrency.sleep_long
    rule_type: absolute
    match: 'Thread\.sleep\(\d{4,}\)'
    severity: high
    impact: runtime
    rationale: "Thread.sleep() for more than 1s detected. Potential for blocking I/O or deadlock."

  # Stability (Absolute Risk)
  - id: runtime.stability.catch_exception
    rule_type: absolute
    match: 'catch\s*\(\s*Exception\s+\w+\s*\)'
    severity: medium
    impact: maintenance
    rationale: "Catching 'Exception' may hide critical runtime errors (e.g., NullPointerException)."

  - id: runtime.stability.optional_get
    rule_type: absolute
    match: '\.get\(\)'
    file: "**.java"
    severity: high
    impact: runtime
    rationale: "Using Optional.get() without isPresent() check can cause NoSuchElementException."

  # Security (Absolute Risk)
  - id: security.sql_injection.string_concat
    rule_type: absolute
    match: 'SELECT\s+.*\s+FROM\s+.*\s+WHERE\s+.*\s+\+\s+\w+'
    severity: critical
    impact: security
    rationale: "SQL concatenation detected. Risk of SQL Injection. Use PreparedStatement instead."

  - id: security.auth.plaintext_token
    rule_type: absolute
    match: '(token|password|secret|key)\s*=\s*["''][a-zA-Z0-9_\-]{16,}["'']'
    severity: critical
    impact: security
    rationale: "Potential plaintext secret/token hardcoded in source code."

  - id: security.network.http_url
    rule_type: absolute
    match: 'http://[a-zA-Z0-9\.\-]+'
    severity: high
    impact: security
    rationale: "Plain HTTP URL detected. Use HTTPS for secure communication."

  # Performance (Absolute Risk)
  - id: performance.io.loop_io
    rule_type: absolute
    match: 'for\s*\(.*\)\s*\{\s*.*\.(read|write|flush|sync|send|receive)\(.*\)'
    severity: high
    impact: performance
    rationale: "I/O operation inside a loop detected. Can lead to extreme latency and high CPU usage."
