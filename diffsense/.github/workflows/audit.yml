name: DiffSense MR Audit

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for posting comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache DiffSense (diff + AST)
        uses: actions/cache@v4
        with:
          path: ~/.diffsense
          # Include core/__init__.py so cache is invalidated when CACHE_VERSION changes
          key: diffsense-${{ runner.os }}-${{ hashFiles('**/requirements.txt') || 'default' }}-${{ hashFiles('**/core/__init__.py') || 'none' }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run DiffSense Audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Starting DiffSense Audit..."
          echo "📊 Repository: ${{ github.repository }}"
          echo "📊 PR Number: ${{ github.event.pull_request.number }}"
          echo "📊 PR Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "📊 PR Base SHA: ${{ github.event.pull_request.base.sha }}"
          
          # Call the unified runner with GitHub parameters
          python run_audit.py \
            --platform github \
            --token "$GITHUB_TOKEN" \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"
          
          # Display output files for debugging
          echo ""
          echo "📁 Checking output files..."
          if [ -f "diffsense-report.json" ]; then
            echo "✅ diffsense-report.json exists"
            echo "📊 Report size: $(wc -c < diffsense-report.json) bytes"
            echo "📄 Report preview:"
            python -c "import json; data=json.load(open('diffsense-report.json')); print(f\"  Review Level: {data.get('review_level', 'N/A')}\"); print(f\"  Details count: {len(data.get('details', []))}\")"
          else
            echo "❌ diffsense-report.json not found"
          fi
          
          if [ -f "diffsense-comments.json" ]; then
            echo "✅ diffsense-comments.json exists"
            echo "📄 Comments count: $(python -c "import json; print(len(json.load(open('diffsense-comments.json'))))")"
          else
            echo "❌ diffsense-comments.json not found"
          fi
          
          if [ -f "diffsense-report.html" ]; then
            echo "✅ diffsense-report.html exists"
            echo "📊 HTML size: $(wc -c < diffsense-report.html) bytes"
          else
            echo "❌ diffsense-report.html not found"
          fi
